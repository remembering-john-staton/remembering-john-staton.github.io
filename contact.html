<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — The John Staton Museum</title>
<meta name="description" content="Send a message to the John Staton Museum archive.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --crimson: #7c1f26;
    --crimson-dark: #5a161b;
    --cream: #f0e8da;
    --cream-dim: rgba(240,232,218,0.6);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--crimson-dark);
    color: var(--cream);
    font-family: 'Lora', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  nav {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 48px;
    border-bottom: 1px solid rgba(240,232,218,0.06);
  }
  .nav-back {
    font-family: 'Lora', serif;
    font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(240,232,218,0.45); text-decoration: none;
    display: flex; align-items: center; gap: 8px;
    transition: color 0.2s;
  }
  .nav-back::before { content: '←'; font-family: sans-serif; font-size: 14px; }
  .nav-back:hover { color: var(--cream); }
  .nav-title {
    font-family: 'Lora', serif;
    font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(240,232,218,0.3);
  }
  .nav-spacer { width: 80px; }

  main {
    flex: 1; position: relative; z-index: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 80px 48px;
  }

  .contact-wrap {
    width: 100%; max-width: 560px;
  }

  .contact-label {
    font-size: 9px; letter-spacing: 0.35em; text-transform: uppercase;
    color: rgba(240,232,218,0.25); margin-bottom: 16px;
    animation: fadeUp 0.5s ease 0.1s both;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 900; line-height: 1; text-transform: uppercase;
    letter-spacing: -0.02em; color: var(--cream);
    margin-bottom: 16px;
    animation: slideIn 0.6s cubic-bezier(0.16,1,0.3,1) 0s both;
  }

  .contact-divider {
    width: 0; height: 1px;
    background: rgba(240,232,218,0.15);
    margin-bottom: 20px;
    animation: expandLine 0.8s cubic-bezier(0.16,1,0.3,1) 0.2s both;
  }

  .contact-desc {
    font-size: 17px; line-height: 1.78;
    color: rgba(240,232,218,0.62);
    margin-bottom: 40px;
    animation: fadeUp 0.6s ease 0.3s both;
  }

  /* Google Form embed */
  .form-embed-wrap {
    animation: fadeUp 0.6s ease 0.4s both;
  }

  .form-placeholder {
    background: rgba(240,232,218,0.04);
    border: 1px solid rgba(240,232,218,0.1);
    padding: 48px 40px;
    text-align: center;
  }

  .form-placeholder-icon {
    font-size: 32px; margin-bottom: 16px; opacity: 0.4;
    font-family: sans-serif;
  }

  .form-placeholder-text {
    font-size: 15px; color: rgba(240,232,218,0.45);
    line-height: 1.7; margin-bottom: 24px;
  }

  .form-placeholder-note {
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(240,232,218,0.2);
  }

  /* Actual iframe — shown when FORM_URL is set */
  .form-iframe {
    width: 100%;
    border: none;
    min-height: 520px;
    background: transparent;
    display: none;
  }

  footer {
    position: relative; z-index: 1;
    padding: 28px 48px;
    border-top: 1px solid rgba(240,232,218,0.06);
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(240,232,218,0.2);
    text-align: center;
  }
  footer a { color: rgba(240,232,218,0.35); text-decoration: none; transition: color 0.2s; }
  footer a:hover { color: rgba(240,232,218,0.7); }

  @keyframes slideIn {
    from { transform: translateX(60px); }
    to   { transform: translateX(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes expandLine {
    from { width: 0; }
    to   { width: 48px; }
  }

  @media (max-width: 600px) {
    nav { padding: 16px 24px; }
    main { padding: 56px 24px; }
    footer { padding: 24px; }
    .form-placeholder { padding: 36px 24px; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-back">Museum</a>
  <div class="nav-title">The John Staton Museum</div>
  <div class="nav-spacer"></div>
</nav>

<main>
  <div class="contact-wrap">
    <div class="contact-label">The Archive</div>
    <h1>Get in Touch</h1>
    <div class="contact-divider"></div>
    <p class="contact-desc">
      Have a memory of John, a correction, a piece of his work we might have missed, or just something you want to say — this is the place.
    </p>

    <div class="form-embed-wrap" id="formWrap">

      <!-- ─────────────────────────────────────────────────────── -->
      <!-- TO ACTIVATE: replace PASTE_YOUR_GOOGLE_FORM_URL_HERE   -->
      <!-- with your Google Form embed URL, e.g.:                 -->
      <!-- https://docs.google.com/forms/d/e/YOUR_ID/viewform     -->
      <!-- Then delete the placeholder div below.                 -->
      <!-- ─────────────────────────────────────────────────────── -->

      <div class="form-placeholder" id="formPlaceholder">
        <div class="form-placeholder-icon">✉</div>
        <p class="form-placeholder-text">
          The contact form is being set up.<br>Check back shortly.
        </p>
        <div class="form-placeholder-note">Form coming soon</div>
      </div>

      <iframe
        class="form-iframe"
        id="contactFrame"
        src=""
        title="Contact form"
        allowfullscreen>
      </iframe>

    </div>
  </div>
</main>

<footer>
  <a href="index.html">← Back to the Museum</a>
</footer>

<script>
  // Drop your Google Form embed URL here once you have it.
  // Format: https://docs.google.com/forms/d/e/YOUR_FORM_ID/viewform?embedded=true
  const FORM_URL = '';

  if (FORM_URL) {
    document.getElementById('formPlaceholder').style.display = 'none';
    const iframe = document.getElementById('contactFrame');
    iframe.src = FORM_URL;
    iframe.style.display = 'block';
  }
</script>

</body>
</html>
