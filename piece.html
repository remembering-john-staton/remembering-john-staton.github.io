<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The John Staton Museum</title>
<meta name="description" content="">
<meta property="og:title" content="">
<meta property="og:description" content="">
<meta property="og:image" content="">
<meta property="og:type" content="article">
<meta property="og:site_name" content="The John Staton Museum">
<link rel="canonical" href="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --crimson: #7c1f26;
    --crimson-dark: #5a161b;
    --cream: #f0e8da;
    --cream-dim: rgba(240,232,218,0.6);
    --text-body: #e8ddd0;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--crimson-dark);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 200;
    pointer-events: none; opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 40px;
  }
  .nav-back {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--cream-dim); text-decoration: none;
    display: flex; align-items: center; gap: 8px;
    transition: color 0.2s;
  }
  .nav-back::before { content: '←'; font-size: 14px; font-family: sans-serif; }
  .nav-back:hover { color: var(--cream); }

  /* Breadcrumbs */
  .breadcrumbs {
    position: fixed; top: 52px; left: 0; right: 0; z-index: 99;
    padding: 0 40px;
    display: flex; align-items: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: rgba(240,232,218,0.22);
    pointer-events: none;
  }
  .breadcrumbs a {
    color: rgba(240,232,218,0.32); text-decoration: none;
    pointer-events: all; transition: color 0.2s;
  }
  .breadcrumbs a:hover { color: rgba(240,232,218,0.7); }
  .breadcrumb-sep { margin: 0 8px; opacity: 0.35; }
  .breadcrumb-current {
    color: rgba(240,232,218,0.5);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 320px;
  }

  /* HERO LAYOUT */
  .piece-hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  /* LEFT: image */
  .piece-image-panel {
    position: sticky;
    top: 0;
    height: 100vh;
    background: #0a0304;
    overflow: hidden;
  }
  .piece-image-panel img {
    width: 100%; height: 100%;
    object-fit: contain;
    object-position: center;
    display: block;
    opacity: 0;
    transform: scale(1.03);
    transition: opacity 0.9s ease, transform 1.2s cubic-bezier(0.16,1,0.3,1);
  }
  .piece-image-panel img.loaded { opacity: 1; transform: scale(1); }
  .piece-image-zoom {
    position: absolute; bottom: 24px; right: 24px;
    background: rgba(10,4,5,0.65); border: 1px solid rgba(240,232,218,0.15);
    color: var(--cream-dim); font-size: 18px;
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.2s, color 0.2s; z-index: 10;
  }
  .piece-image-zoom:hover { background: rgba(10,4,5,0.9); color: var(--cream); }

  /* RIGHT: scrollable info */
  .piece-info-panel {
    display: flex; flex-direction: column;
    padding: 80px 52px 100px;
    background: var(--crimson-dark);
    border-left: 1px solid rgba(240,232,218,0.06);
    min-height: 100vh;
  }

  /* Scroll-reveal for each block */
  .reveal {
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.65s ease, transform 0.65s cubic-bezier(0.16,1,0.3,1);
  }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  .piece-label {
    font-size: 9px; letter-spacing: 0.35em; text-transform: uppercase;
    color: rgba(240,232,218,0.25); margin-bottom: 16px;
    overflow: hidden;
  }
  .piece-label span {
    display: block;
    transform: translateY(110%);
    animation: snapUp 0.5s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
  }

  .piece-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 3.2vw, 52px);
    font-weight: 900; line-height: 1.0;
    letter-spacing: -0.02em; text-transform: uppercase;
    color: var(--cream); overflow: hidden; margin-bottom: 24px;
  }
  .piece-title span {
    display: block;
    transform: translateX(80px);
    animation: titleSlam 0.65s cubic-bezier(0.16,1,0.3,1) 0.1s forwards;
  }

  .piece-divider {
    width: 0; height: 1px;
    background: rgba(240,232,218,0.15); margin-bottom: 24px;
    animation: expandLine 0.8s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;
  }

  /* Date — prominent */
  .piece-date {
    font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(240,232,218,0.32); margin-bottom: 28px;
  }

  /* Description — formatted HTML */
  .piece-description {
    font-size: 19px; line-height: 1.82;
    color: rgba(240,232,218,0.78);
    margin-bottom: 28px;
  }
  .piece-description p { margin-bottom: 1em; }
  .piece-description p:last-child { margin-bottom: 0; }
  .piece-description strong { color: var(--cream); font-weight: 600; }
  .piece-description em { font-style: italic; color: rgba(240,232,218,0.65); }


  /* Footnotes */
  .piece-description sup { font-size: 11px; vertical-align: super; color: rgba(240,232,218,0.5); }
  .piece-footnotes {
    margin-top: 16px; padding-top: 14px;
    border-top: 1px solid rgba(240,232,218,0.08);
    font-size: 13px; line-height: 1.65; color: rgba(240,232,218,0.45);
    font-style: italic;
  }
  /* Tags */
  .piece-tags {
    display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 28px;
  }
  .piece-tag {
    font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(240,232,218,0.3); border: 1px solid rgba(240,232,218,0.1);
    padding: 4px 10px; border-radius: 2px;
  }

  /* Comment archive */
  .piece-comments-inline { margin-bottom: 28px; }
  .piece-comments-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
    color: rgba(240,232,218,0.25); margin-bottom: 20px;
    padding-bottom: 12px; border-bottom: 1px solid rgba(240,232,218,0.08);
  }
  .comment-row {
    padding: 14px 0 13px;
    border-bottom: 1px solid rgba(240,232,218,0.05);
    position: relative;
  }
  .comment-row:last-child { border-bottom: none; }
  /* Reply indentation — left border thread line */
  .comment-row[data-depth="1"] {
    padding-left: 18px;
    border-left: 1px solid rgba(124,31,38,0.3);
    margin-left: 10px;
    background: transparent;
  }
  .comment-row[data-depth="2"] {
    padding-left: 18px;
    border-left: 1px solid rgba(124,31,38,0.18);
    margin-left: 26px;
    background: transparent;
  }
  .comment-thread-line { display: none; }
  .comment-dot { display: none; }
  .comment-meta-row {
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 5px; flex-wrap: wrap;
  }
  .comment-username {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px; font-weight: 400;
    color: rgba(240,232,218,0.45);
    letter-spacing: 0.04em;
  }
  .comment-username.is-artist {
    color: var(--cream);
    font-weight: 600;
  }
  .comment-artist-star {
    color: var(--crimson); font-size: 10px; margin-left: 2px;
  }
  .comment-date-small {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px; color: rgba(240,232,218,0.18);
    letter-spacing: 0.04em;
  }
  .comment-body-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px; line-height: 1.72;
    color: rgba(240,232,218,0.52);
  }
  .comment-row.is-artist .comment-body-text {
    color: rgba(240,232,218,0.78);
  }
  .comments-show-more {
    margin-top: 14px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px; letter-spacing: 0.1em;
    color: rgba(240,232,218,0.28); cursor: pointer;
    border: none; background: none; padding: 0; display: block;
    transition: color 0.2s;
  }
  .comments-show-more:hover { color: rgba(240,232,218,0.6); }

  /* DA link */
  .piece-da-link {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(240,232,218,0.3); text-decoration: none;
    border: 1px solid rgba(240,232,218,0.1); padding: 9px 16px;
    margin-top: 8px; align-self: flex-start;
    transition: color 0.2s, border-color 0.2s;
  }
  .piece-da-link:hover { color: var(--cream); border-color: rgba(240,232,218,0.3); }
  .piece-da-link::after { content: '↗'; font-size: 12px; font-family: sans-serif; }

  /* RELATED */
  .piece-related {
    background: #0a0304; padding: 64px 52px;
    border-top: 1px solid rgba(240,232,218,0.05);
  }
  .piece-related-label {
    font-size: 9px; letter-spacing: 0.32em; text-transform: uppercase;
    color: rgba(240,232,218,0.18); margin-bottom: 28px;
  }
  .piece-related-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 2px; }
  .piece-related-item { aspect-ratio:1; overflow:hidden; cursor:pointer; position:relative; }
  .piece-related-item img {
    width:100%; height:100%; object-fit:cover; display:block;
    filter: saturate(0.65) brightness(0.75);
    transition: filter 0.4s ease, transform 0.5s ease;
  }
  .piece-related-item:hover img { filter: saturate(1) brightness(1); transform: scale(1.05); }
  .piece-related-item-title {
    position:absolute; bottom:0; left:0; right:0;
    padding: 20px 12px 10px;
    background: linear-gradient(to top, rgba(10,4,5,0.85) 0%, transparent 100%);
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(240,232,218,0.65); opacity:0; transition: opacity 0.3s;
  }
  .piece-related-item:hover .piece-related-item-title { opacity:1; }

  /* LIGHTBOX */
  .lightbox {
    position:fixed; inset:0; z-index:500; background: rgba(5,2,3,0.95);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition: opacity 0.3s ease;
  }
  .lightbox.open { opacity:1; pointer-events:all; }
  .lightbox img { max-width:90vw; max-height:90vh; object-fit:contain; }
  .lightbox-close {
    position:absolute; top:24px; right:28px; background:none; border:none;
    color: rgba(240,232,218,0.5); font-size:26px; cursor:pointer;
    min-width:44px; min-height:44px;
    display:flex; align-items:center; justify-content:center;
    transition: color 0.2s;
  }
  .lightbox-close:hover { color: var(--cream); }

  /* NOT FOUND */
  .piece-not-found {
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:20px; padding:40px; text-align:center;
  }
  .piece-not-found h1 {
    font-family:'Playfair Display',serif; font-size:48px; font-weight:900;
    text-transform:uppercase; color:var(--cream);
  }
  .piece-not-found a {
    color:var(--cream-dim); font-size:12px; letter-spacing:0.2em; text-transform:uppercase;
    text-decoration:none; border-bottom:1px solid rgba(240,232,218,0.2); padding-bottom:2px;
  }

  /* KEYFRAMES */
  @keyframes snapUp { from { transform:translateY(110%); } to { transform:translateY(0); } }
  @keyframes titleSlam { from { transform:translateX(80px); } to { transform:translateX(0); } }
  @keyframes expandLine { from { width:0; } to { width:52px; } }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .piece-hero { grid-template-columns:1fr; }
    .piece-image-panel { position:relative; height:65vw; min-height:240px; }
    .piece-image-panel img { object-fit:cover; }
    .piece-info-panel { padding:40px 24px 80px; }
    .piece-related { padding:48px 24px; }
    .piece-related-grid { grid-template-columns:repeat(2,1fr); }
    nav { padding:16px 24px; }
    .breadcrumbs { padding:0 24px; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-back">Museum</a>
</nav>

<div class="breadcrumbs" id="breadcrumbs">
  <a href="index.html">Museum</a>
  <span class="breadcrumb-sep">/</span>
  <a href="#" id="breadcrumbTopic" style="display:none"></a>
  <span class="breadcrumb-sep" id="breadcrumbTopicSep" style="display:none"></span>
  <span class="breadcrumb-current" id="breadcrumbTitle">—</span>
</div>

<div id="pieceContent"></div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">&#x2715;</button>
  <img id="lightboxImg" src="" alt="" />
</div>

<script>
async function init() {
  const params  = new URLSearchParams(window.location.search);
  const pieceId = params.get('id');
  const topicId = params.get('topic');  // optional topic context

  let pieces, topics;
  try {
    [pieces, topics] = await Promise.all([
      fetch('data/pieces.json').then(r => r.json()),
      fetch('data/topics.json').then(r => r.json()).catch(() => [])
    ]);
  } catch(e) { showNotFound('Could not load data.'); return; }

  const piece = pieceId
    ? pieces.find(p => p.id === pieceId)
    : pieces[Math.floor(Math.random() * pieces.length)];

  if (!piece) { showNotFound(`No piece found.`); return; }

  // SEO meta
  document.title = `${piece.title} — The John Staton Museum`;
  setMeta('description', piece.description ? piece.description.slice(0, 155) : 'Art by John Staton');
  setMeta('og:title', `${piece.title} — The John Staton Museum`);
  setMeta('og:description', piece.description ? piece.description.slice(0, 155) : '');
  setMeta('og:image', piece.image ? `https://remembering-john-staton.github.io/${piece.image}` : '');
  setMeta('canonical', `https://remembering-john-staton.github.io/piece.html?id=${piece.id}`, true);

  // Breadcrumb
  document.getElementById('breadcrumbTitle').textContent = piece.title;
  if (topicId && topics.length) {
    const topic = topics.find(t => t.id === topicId);
    if (topic) {
      const el = document.getElementById('breadcrumbTopic');
      el.textContent = topic.title;
      el.href = `#themes`;
      el.style.display = '';
      document.getElementById('breadcrumbTopicSep').style.display = '';
    }
  }

  renderPiece(piece, pieces);
}

function setMeta(name, content, isLink) {
  if (isLink) {
    let el = document.querySelector('link[rel="canonical"]');
    if (el) el.href = content;
    return;
  }
  let el = document.querySelector(`[property="${name}"], [name="${name}"]`);
  if (el) el.setAttribute('content', content);
}

function renderPiece(piece, allPieces) {
  const related = allPieces
    .filter(p => p.id !== piece.id && p.image)
    .sort(() => Math.random() - 0.5)
    .slice(0, 4);

  // Tags
  const tagsHtml = piece.tags && piece.tags.length
    ? `<div class="piece-tags reveal">
        ${piece.tags.map(t => `<span class="piece-tag">${escHtml(t)}</span>`).join('')}
       </div>` : '';

  // Threaded comment archive
  function buildComments(comments) {
    if (!comments || !comments.length) return '';
    const PREVIEW = 8;
    const rows = comments.map((c, i) => {
      const depth = c.depth || 0;
      const hidden = i >= PREVIEW ? 'data-extra="1" style="display:none"' : '';
      return `<div class="comment-row${c.is_artist ? ' is-artist' : ''}" data-depth="${depth}" ${hidden}>
        <div class="comment-meta-row">
          <span class="comment-username${c.is_artist ? ' is-artist' : ''}">${escHtml(c.user)}${c.is_artist ? ' <span class="comment-artist-star">★</span>' : ''}</span>
          <span class="comment-date-small">${escHtml(c.date)}</span>
        </div>
        <div class="comment-body-text">${escHtml(c.text)}</div>
      </div>`;
    }).join('');
    const more = comments.length > PREVIEW
      ? `<button class="comments-show-more" onclick="
          this.closest('.piece-comments-inline').querySelectorAll('[data-extra]').forEach(e=>e.style.display='grid');
          this.remove()">+ ${comments.length - PREVIEW} more</button>` : '';
    return `<div class="piece-comments-inline reveal">
      <div class="piece-comments-label">Comments (${comments.length})</div>
      ${rows}${more}
    </div>`;
  }

  // Related
  const relatedHtml = related.length
    ? `<section class="piece-related">
        <div class="piece-related-label">More from the archive</div>
        <div class="piece-related-grid">
          ${related.map(r => `
            <div class="piece-related-item" onclick="navigateTo('${r.id}')">
              <img src="${r.image}" alt="${escHtml(r.title)}" loading="lazy" />
              <div class="piece-related-item-title">${escHtml(r.title)}</div>
            </div>`).join('')}
        </div>
      </section>` : '';

  document.getElementById('pieceContent').innerHTML = `
    <main class="piece-hero">
      <div class="piece-image-panel">
        <img id="mainImg" src="${piece.image}" alt="${escHtml(piece.title)}" />
        <button class="piece-image-zoom" id="zoomBtn">&#x2922;</button>
      </div>
      <div class="piece-info-panel">
        <div class="piece-label"><span>The John Staton Museum</span></div>
        <h1 class="piece-title"><span>${escHtml(piece.title)}</span></h1>
        <div class="piece-divider"></div>
        ${piece.date ? `<div class="piece-date reveal">${escHtml(piece.date)}</div>` : ''}
        ${piece.description_html
            ? `<div class="piece-description reveal">${piece.description_html}</div>`
            : piece.description
            ? `<div class="piece-description reveal">${escHtml(piece.description)}</div>`
            : ''}
        ${tagsHtml}
        ${buildComments(piece.comments)}
        ${piece.da_url
          ? `<a class="piece-da-link reveal" href="${piece.da_url}" target="_blank" rel="noopener">View on DeviantArt</a>`
          : ''}
      </div>
    </main>
    ${relatedHtml}
  `;

  // Image load
  const img = document.getElementById('mainImg');
  if (img.complete) img.classList.add('loaded');
  else img.addEventListener('load', () => img.classList.add('loaded'));

  // Scroll reveal on right panel items
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        revealObserver.unobserve(e.target);
      }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.reveal').forEach((el, i) => {
    el.style.transitionDelay = `${i * 0.06}s`;
    revealObserver.observe(el);
  });

  // Lightbox
  const lightbox   = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  document.getElementById('zoomBtn').addEventListener('click', () => {
    lightboxImg.src = piece.image;
    lightbox.classList.add('open');
  });
  document.getElementById('lightboxClose').addEventListener('click', () => lightbox.classList.remove('open'));
  lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('open'); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') lightbox.classList.remove('open'); });
}

function navigateTo(id) { window.location.href = `piece.html?id=${id}`; }

function showNotFound(msg) {
  document.getElementById('pieceContent').innerHTML = `
    <div class="piece-not-found">
      <h1>Not Found</h1>
      <p style="color:var(--cream-dim)">${msg}</p>
      <a href="index.html">← Back to the Museum</a>
    </div>`;
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
