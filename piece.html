<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The John Staton Museum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --crimson: #7c1f26;
    --crimson-dark: #5a161b;
    --cream: #f0e8da;
    --cream-dim: rgba(240,232,218,0.6);
    --text-body: #e8ddd0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--crimson-dark);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── GRAIN ─── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 200;
    pointer-events: none; opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  /* ─── NAV ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 40px;
  }
  .nav-back {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--cream-dim);
    text-decoration: none;
    display: flex; align-items: center; gap: 10px;
    transition: color 0.2s;
  }
  .nav-back:hover { color: var(--cream); }
  .nav-back::before { content: '←'; font-size: 16px; font-family: sans-serif; }
  .nav-spacer { width: 80px; }

  /* Breadcrumbs */
  .breadcrumbs {
    position: fixed;
    top: 58px; left: 0; right: 0;
    z-index: 99;
    padding: 0 40px;
    display: flex;
    align-items: center;
    gap: 0;
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(240,232,218,0.28);
    pointer-events: none;
  }
  .breadcrumbs a {
    color: rgba(240,232,218,0.38);
    text-decoration: none;
    pointer-events: all;
    transition: color 0.2s;
  }
  .breadcrumbs a:hover { color: rgba(240,232,218,0.75); }
  .breadcrumb-sep {
    margin: 0 10px;
    opacity: 0.4;
  }
  .breadcrumb-current {
    color: rgba(240,232,218,0.55);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 340px;
  }

  /* ─── HERO ─── */
  .piece-hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    padding-top: 0;
  }

  /* Left: full-bleed image */
  .piece-image-panel {
    position: relative;
    background: #0e0608;
    overflow: hidden;
  }
  .piece-image-panel img {
    width: 100%; height: 100%;
    object-fit: contain;
    object-position: center;
    display: block;
    opacity: 0;
    transform: scale(1.04);
    transition: opacity 0.9s ease, transform 1.2s cubic-bezier(0.16,1,0.3,1);
  }
  .piece-image-panel img.loaded {
    opacity: 1;
    transform: scale(1);
  }
  .piece-image-zoom {
    position: absolute;
    bottom: 24px; right: 24px;
    background: rgba(10,4,5,0.7);
    border: 1px solid rgba(240,232,218,0.15);
    color: var(--cream-dim);
    font-size: 18px;
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    z-index: 10;
  }
  .piece-image-zoom:hover { background: rgba(10,4,5,0.9); color: var(--cream); }

  /* Right: info panel */
  .piece-info-panel {
    display: flex;
    flex-direction: column;
    padding: 88px 56px 60px;
    overflow-y: auto;
    background: var(--crimson-dark);
    border-left: 1px solid rgba(240,232,218,0.06);
  }

  .piece-label {
    font-size: 9px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(240,232,218,0.25);
    margin-bottom: 20px;
    overflow: hidden;
  }
  .piece-label span {
    display: block;
    transform: translateY(110%);
    animation: snapUp 0.5s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
  }

  .piece-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 3.5vw, 56px);
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    color: var(--cream);
    overflow: hidden;
    margin-bottom: 28px;
  }
  .piece-title span {
    display: block;
    transform: translateX(80px);
    animation: titleSlam 0.65s cubic-bezier(0.16,1,0.3,1) 0.15s forwards;
  }

  .piece-divider {
    width: 0;
    height: 1px;
    background: rgba(240,232,218,0.18);
    margin-bottom: 28px;
    animation: expandLine 0.8s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
  }

  .piece-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.6s forwards;
  }
  .piece-meta-item { display: flex; flex-direction: column; gap: 4px; }
  .piece-meta-key {
    font-size: 8px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(240,232,218,0.25);
  }
  .piece-meta-val {
    font-size: 14px;
    color: rgba(240,232,218,0.7);
    letter-spacing: 0.03em;
  }

  .piece-description {
    font-size: 17px;
    line-height: 1.85;
    color: rgba(240,232,218,0.7);
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.75s forwards;
  }

  /* Tags */
  .piece-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.85s forwards;
  }
  .piece-tag {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(240,232,218,0.4);
    border: 1px solid rgba(240,232,218,0.12);
    padding: 5px 12px;
    border-radius: 2px;
  }

  /* Artist notes */
  .piece-notes {
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.95s forwards;
  }
  .piece-notes-label {
    font-size: 8px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(240,232,218,0.25);
    margin-bottom: 12px;
  }
  .piece-note {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-style: italic;
    line-height: 1.75;
    color: rgba(240,232,218,0.55);
    padding: 16px 20px;
    border-left: 2px solid var(--crimson);
    background: rgba(124,31,38,0.12);
    margin-bottom: 10px;
  }

  /* DA link */
  .piece-da-link {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(240,232,218,0.35);
    text-decoration: none;
    border: 1px solid rgba(240,232,218,0.1);
    padding: 10px 18px;
    margin-top: auto;
    transition: color 0.2s, border-color 0.2s;
    align-self: flex-start;
    opacity: 0;
    animation: fadeUp 0.6s ease 1.1s forwards;
  }
  .piece-da-link:hover { color: var(--cream); border-color: rgba(240,232,218,0.3); }
  .piece-da-link::after { content: '↗'; font-size: 13px; font-family: sans-serif; }

  /* ─── RELATED ─── */
  .piece-related {
    background: #0e0608;
    padding: 80px 56px;
    border-top: 1px solid rgba(240,232,218,0.06);
  }
  .piece-related-label {
    font-size: 9px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(240,232,218,0.2);
    margin-bottom: 32px;
  }
  .piece-related-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2px;
  }
  .piece-related-item {
    aspect-ratio: 1;
    overflow: hidden;
    cursor: pointer;
    position: relative;
  }
  .piece-related-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    filter: saturate(0.7) brightness(0.8);
    transition: filter 0.4s ease, transform 0.5s ease;
  }
  .piece-related-item:hover img {
    filter: saturate(1) brightness(1);
    transform: scale(1.05);
  }
  .piece-related-item-title {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 24px 14px 12px;
    background: linear-gradient(to top, rgba(10,4,5,0.85) 0%, transparent 100%);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(240,232,218,0.7);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .piece-related-item:hover .piece-related-item-title { opacity: 1; }

  /* ─── LIGHTBOX ─── */
  .lightbox {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(5,2,3,0.95);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .lightbox.open { opacity: 1; pointer-events: all; }
  .lightbox img {
    max-width: 90vw; max-height: 90vh;
    object-fit: contain;
    box-shadow: 0 40px 120px rgba(0,0,0,0.8);
  }
  .lightbox-close {
    position: absolute; top: 24px; right: 28px;
    background: none; border: none;
    color: rgba(240,232,218,0.5);
    font-size: 28px; cursor: pointer;
    transition: color 0.2s;
    min-width: 44px; min-height: 44px;
    display: flex; align-items: center; justify-content: center;
  }
  .lightbox-close:hover { color: var(--cream); }

  /* ─── NOT FOUND ─── */
  .piece-not-found {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; padding: 40px;
    text-align: center;
  }
  .piece-not-found h1 {
    font-family: 'Playfair Display', serif;
    font-size: 48px; font-weight: 900;
    text-transform: uppercase;
    color: var(--cream);
  }
  .piece-not-found p {
    font-size: 16px; color: var(--cream-dim);
  }
  .piece-not-found a {
    color: var(--cream-dim); font-size: 12px;
    letter-spacing: 0.2em; text-transform: uppercase;
    text-decoration: none; border-bottom: 1px solid rgba(240,232,218,0.2);
    padding-bottom: 2px;
  }

  /* ─── KEYFRAMES ─── */
  @keyframes snapUp {
    from { transform: translateY(110%); }
    to   { transform: translateY(0); }
  }
  @keyframes titleSlam {
    from { transform: translateX(80px); }
    to   { transform: translateX(0); }
  }
  @keyframes expandLine {
    from { width: 0; }
    to   { width: 60px; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 768px) {
    .piece-hero { grid-template-columns: 1fr; min-height: auto; }
    .piece-image-panel { height: 60vw; min-height: 280px; }
    .piece-image-panel img { object-fit: cover; }
    .piece-info-panel { padding: 40px 28px 60px; }
    .piece-related { padding: 60px 28px; }
    .piece-related-grid { grid-template-columns: repeat(2, 1fr); }
    nav { padding: 16px 24px; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-back">Museum</a>
  <div class="nav-spacer"></div>
</nav>

<div class="breadcrumbs" id="breadcrumbs">
  <a href="index.html">Museum</a>
  <span class="breadcrumb-sep">/</span>
  <span class="breadcrumb-current" id="breadcrumbTitle">—</span>
</div>

<div id="pieceContent"></div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">&#x2715;</button>
  <img id="lightboxImg" src="" alt="" />
</div>

<script>
// ─── LOAD PIECE FROM ?id= ───
async function init() {
  const params = new URLSearchParams(window.location.search);
  const pieceId = params.get('id');

  let pieces;
  try {
    const res = await fetch('data/pieces.json');
    pieces = await res.json();
  } catch(e) {
    showNotFound('Could not load piece data.');
    return;
  }

  const piece = pieceId
    ? pieces.find(p => p.id === pieceId)
    : pieces[Math.floor(Math.random() * pieces.length)]; // demo: random if no id

  if (!piece) { showNotFound(`No piece found with id "${pieceId}".`); return; }

  document.title = `${piece.title} — The John Staton Museum`;
  const bc = document.getElementById('breadcrumbTitle');
  if (bc) bc.textContent = piece.title;
  renderPiece(piece, pieces);
}

function renderPiece(piece, allPieces) {
  // Pick 4 related pieces (same tags or random)
  const related = allPieces
    .filter(p => p.id !== piece.id && p.image)
    .sort(() => Math.random() - 0.5)
    .slice(0, 4);

  const notesHtml = piece.artist_notes && piece.artist_notes.length
    ? `<div class="piece-notes">
        <div class="piece-notes-label">Artist's Notes</div>
        ${piece.artist_notes.slice(0,2).map(n =>
          `<div class="piece-note">${escHtml(n)}</div>`
        ).join('')}
       </div>`
    : '';

  const tagsHtml = piece.tags && piece.tags.length
    ? `<div class="piece-tags">${piece.tags.map(t =>
        `<span class="piece-tag">${escHtml(t)}</span>`
      ).join('')}</div>`
    : '';

  const relatedHtml = related.length
    ? `<section class="piece-related">
        <div class="piece-related-label">More from the archive</div>
        <div class="piece-related-grid">
          ${related.map(r => `
            <div class="piece-related-item" onclick="navigateTo('${r.id}')">
              <img src="${r.image}" alt="${escHtml(r.title)}" loading="lazy" />
              <div class="piece-related-item-title">${escHtml(r.title)}</div>
            </div>
          `).join('')}
        </div>
      </section>`
    : '';

  document.getElementById('pieceContent').innerHTML = `
    <main class="piece-hero">
      <div class="piece-image-panel">
        <img id="mainImg" src="${piece.image}" alt="${escHtml(piece.title)}" />
        <button class="piece-image-zoom" id="zoomBtn" title="View full size">&#x2922;</button>
      </div>

      <div class="piece-info-panel">
        <div class="piece-label"><span>Original Work</span></div>
        <h1 class="piece-title"><span>${escHtml(piece.title)}</span></h1>
        <div class="piece-divider"></div>

        <div class="piece-meta">
          ${piece.date ? `
            <div class="piece-meta-item">
              <span class="piece-meta-key">Posted</span>
              <span class="piece-meta-val">${escHtml(piece.date)}</span>
            </div>` : ''}
          ${piece.tags && piece.tags.length ? `
            <div class="piece-meta-item">
              <span class="piece-meta-key">Tags</span>
              <span class="piece-meta-val">${piece.tags.join(', ')}</span>
            </div>` : ''}
        </div>

        ${piece.description ? `
          <p class="piece-description">${escHtml(piece.description)}</p>` : ''}

        ${notesHtml}
        ${tagsHtml}

        ${piece.da_url ? `
          <a class="piece-da-link" href="${piece.da_url}" target="_blank" rel="noopener">
            View on DeviantArt
          </a>` : ''}
      </div>
    </main>

    ${relatedHtml}
  `;

  // Image load reveal
  const img = document.getElementById('mainImg');
  if (img.complete) {
    img.classList.add('loaded');
  } else {
    img.addEventListener('load', () => img.classList.add('loaded'));
  }

  // Zoom / lightbox
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  document.getElementById('zoomBtn').addEventListener('click', () => {
    lightboxImg.src = piece.image;
    lightboxImg.alt = piece.title;
    lightbox.classList.add('open');
  });
  document.getElementById('lightboxClose').addEventListener('click', () => {
    lightbox.classList.remove('open');
  });
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) lightbox.classList.remove('open');
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') lightbox.classList.remove('open');
  });
}

function navigateTo(id) {
  window.location.href = `piece.html?id=${id}`;
}

function showNotFound(msg) {
  document.getElementById('pieceContent').innerHTML = `
    <div class="piece-not-found">
      <h1>Not Found</h1>
      <p>${msg}</p>
      <a href="index.html">← Back to the Museum</a>
    </div>
  `;
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
